name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Link project
        run: vercel link --yes --project=abesekkotsuin --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Pull settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Ensure public env is inlined at build
        run: |
          f=".vercel/.env.production.local"
          touch "$f"
          grep -q '^NEXT_PUBLIC_LIFF_ID=' "$f"  || echo 'NEXT_PUBLIC_LIFF_ID=2010754963-gieRq73Z' >> "$f"
          grep -q '^NEXT_PUBLIC_SITE_URL=' "$f" || echo 'NEXT_PUBLIC_SITE_URL=https://abesekkotsuin.vercel.app' >> "$f"
      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
